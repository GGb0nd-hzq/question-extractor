# 题目提取工具 — 配置文件
# 使用视觉语言模型 (VLM) API 从试卷 PDF 中提取题目

# ---- API 配置 ----
# 支持所有 OpenAI 兼容接口的视觉模型
# 环境变量 API_KEY 和 API_BASE_URL 会覆盖此处的设置
api:
  provider: dashscope           # dashscope / openai / custom
  model: qwen-vl-max            # 视觉模型名称
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  # api_key: 请设置环境变量 API_KEY，不要写在这里
  max_tokens: 8192

# ---- PDF 渲染 ----
pdf:
  dpi: 200

# ---- 输出 ----
output:
  pretty_json: true
